name: Run Tests

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libgpiod-dev

      - name: Build and install wiringPi from source
        run: |
          git clone https://github.com/WiringPi/WiringPi.git
          cd WiringPi
          ./build
          cd ..
          # Verify installation
          gpio -v

      - name: Configure with CMake
        run: |
          mkdir -p build
          cd build
          cmake .. \
            -DCMAKE_C_FLAGS="-Wall -Wextra -Werror -Wpedantic"

      - name: Build
        run: |
          cd build
          make -j$(nproc)
      
      - name: Run test
        run: |
          cd build
          ctest --output-on-failure
